
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.igiwaz.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.igiwaz.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.leanback:leanback:1.0.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
